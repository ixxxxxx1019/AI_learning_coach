# ============================================================
# Docker Compose — 多服务编排
# ============================================================
# 启动：docker compose up -d
# 停止：docker compose down
# 日志：docker compose logs -f app
# ============================================================

services:
  app:
    build: .
    container_name: ai-coach-langchain
    ports:
      - "8000:8000"  # FastAPI REST API
      - "8501:8501"  # Streamlit Web UI
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "health.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 可选：Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: ai-coach-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    profiles:
      - caching  # 仅在启用 caching profile 时启动

volumes:
  redis_data:
